<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạp Hóa Chồng Cún Bự</title>
    
    <!-- Import Font chữ nghệ thuật từ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ================= CSS: THIẾT LẬP GIAO DIỆN ================= */
        :root {
            --bg-color: #F8F5F0; /* Màu Beige nhạt */
            --primary-color: #722F37; /* Màu Đỏ Burgundy */
            --primary-hover: #5a242b;
            --text-dark: #333333;
            --text-light: #666666;
            --card-bg: #FFFFFF;
            --font-serif: 'Playfair Display', serif;
            --font-body: 'Lora', serif; /* Dùng Lora cho phần text dễ đọc mà vẫn nghệ thuật */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: var(--font-body);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- View Management (Quản lý ẩn/hiện trang) --- */
        .view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Header & Title --- */
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* --- Controls: Search & Tags --- */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 40px; }
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary-color); box-shadow: 0 0 8px rgba(114, 47, 55, 0.2); }
        
        .tags-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .tag-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 6px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.3s;
        }
        .tag-btn:hover, .tag-btn.active {
            background-color: var(--primary-color);
            color: #fff;
        }

        /* --- Gallery Grid --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        .card-info { padding: 15px; text-align: center; }
        .card-name { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; color: var(--primary-color); }

        /* --- Detail View --- */
        .back-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 1rem;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .back-btn:hover { background-color: var(--primary-hover); }

        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .detail-img { width: 100%; border-radius: 12px; object-fit: cover; aspect-ratio: 3/4; }
        .detail-info { display: flex; flex-direction: column; gap: 15px; }
        .detail-name { font-family: var(--font-serif); font-size: 3rem; color: var(--primary-color); line-height: 1.2; }
        
        .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .detail-tag { background: #f0f0f0; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; color: var(--text-light); }
        
        .info-box { background: var(--bg-color); padding: 15px; border-radius: 8px; }
        .info-box h3 { font-family: var(--font-serif); margin-bottom: 5px; color: var(--primary-color); }
        
        .story-section { margin-top: 40px; padding-top: 30px; border-top: 1px solid #ddd; grid-column: 1 / -1; }
        .story-section h2 { font-family: var(--font-serif); color: var(--primary-color); margin-bottom: 20px; font-size: 2rem; }
        .story-content { white-space: pre-line; margin-bottom: 30px; }
        
        .story-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .story-images img { width: 100%; border-radius: 8px; }

        .link-section { margin-top: 20px; }
        .link-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-right: 10px;
            transition: 0.3s;
        }
        .link-btn:hover { background-color: var(--primary-hover); }

        /* Responsive */
        @media (max-width: 768px) {
            .detail-layout { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ================= VIEW 1: TRANG CHỦ (GALLERY) ================= -->
    <div id="home-view" class="view active">
        <header>
            <!-- Bạn có thể đổi tên Tiêu đề ở đây -->
            <h1>Tạp Hóa Chồng Cún Bự</h1>
            <p>Nơi lưu giữ những đứa con tinh thần</p>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" class="search-bar" placeholder="Nhập tên nhân vật bạn muốn tìm...">
            <div class="tags-container" id="tagsContainer">
                <!-- Nút tag sẽ được JS tạo tự động ở đây -->
            </div>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Thẻ nhân vật sẽ được JS tạo tự động ở đây -->
        </div>
        
        <div id="no-result" style="display:none; text-align:center; color: var(--text-light); width: 100%;">
            Không tìm thấy nhân vật nào phù hợp 😭
        </div>
    </div>

    <!-- ================= VIEW 2: TRANG CHI TIẾT NHÂN VẬT ================= -->
    <div id="detail-view" class="view">
        <button class="back-btn" onclick="goHome()">&#8592; Quay lại Tạp hóa</button>
        
        <div class="detail-layout">
            <!-- Cột trái: Ảnh chân dung lớn -->
            <div>
                <img id="dt-image" class="detail-img" src="" alt="">
            </div>
            
            <!-- Cột phải: Thông tin cơ bản -->
            <div class="detail-info">
                <h1 id="dt-name" class="detail-name">Tên OC</h1>
                <div id="dt-tags" class="detail-tags"></div>
                
                <div class="info-box">
                    <h3>Tuổi / Ngày sinh</h3>
                    <p id="dt-age"></p>
                </div>
                
                <div class="info-box">
                    <h3>Ngoại hình</h3>
                    <p id="dt-appearance"></p>
                </div>

                <div class="info-box">
                    <h3>Tính cách / Đặc điểm</h3>
                    <p id="dt-personality"></p>
                </div>
            </div>

            <!-- Phần dưới (chiếm cả 2 cột): Cốt truyện & Hình ảnh bối cảnh & Link -->
            <div class="story-section">
                <h2>Cốt truyện & Tiểu sử</h2>
                <div id="dt-story" class="story-content"></div>
                
                <!-- Khu vực chèn ảnh bối cảnh / extra art -->
                <div id="dt-extra-images" class="story-images"></div>

                <!-- Khu vực chèn link đọc truyện / character sheet -->
                <div id="dt-links" class="link-section"></div>
            </div>
        </div>
    </div>
</div>

<!-- ================= JAVASCRIPT: DATA & LOGIC ================= -->
<script>
    // ---------------------------------------------------------
    // BƯỚC 1: THAY ĐỔI DỮ LIỆU NHÂN VẬT (DATA) Ở ĐÂY
    // ---------------------------------------------------------
    // Hướng dẫn: Thêm nhân vật mới bằng cách copy cặp ngoặc nhọn { ... },
    // Hãy dùng link ảnh trực tuyến (Imgur, Discord, Pinterest...) 
    // hoặc tên file ảnh nếu bạn để chung thư mục (ví dụ: 'anh1.jpg')
    
    const ocData = [
        {
            id: 1,
            name: "Hồ Tĩnh An",
            image: "https://i.ibb.co/JYRVxZV/c5f0dd92d21653480a07.jpg", // Ảnh vuông trang chủ
            fullImage: "https://i.ibb.co/JYRVxZV/c5f0dd92d21653480a07.jpg", // Ảnh to trang chi tiết
            tags: ["Việt Nam xưa", "BL", "BG"],
            age: "27 tuổi",
            appearance: " Mái tóc đen tuyền, phía trước cắt ngắn rẽ ngôi giữa, mái bên trái dài hơn che khuất một phần gương mặt. Đằng sau có một nhúm tóc dài mỏng thường được buộc gọn gàng. Trên nửa bên trái khuôn mặt có một vết bớt màu xám đen kéo dài từ trán xuống gần mắt. Đôi mắt đen trầm tĩnh, sống mũi cao, môi mỏng, vóc người cao gầy. Quần áo thường ngày giản dị, đa phần là trường sam hoặc áo dài ngũ thân màu tối. Trên người luôn phảng phất mùi thảo dược thanh sạch do quanh năm tiếp xúc với thuốc Bắc, thuốc Nam. Cao 185cm",
            personality: "Hồ Tĩnh An nổi tiếng là người trầm ổn, kiệm lời và luôn giữ lễ nghĩa trong từng cử chỉ. Khi hành nghề, anh tuyệt đối nghiêm túc, xem việc cứu người là bổn phận. Dẫu đối đãi với ai cũng nhã nhặn, anh hiếm khi bộc lộ cảm xúc hay xen vào chuyện thị phi của người khác. Bởi vậy, người trong vùng đều kính trọng tài y và nhân phẩm của anh, song cũng ngại ngần vì vẻ ngoài lạnh lùng, xa cách.",
            story: "{{user}} là con út nhà ông Lớn ở làng An Hòa, một làng quê yên bình thuộc Nam Kỳ Lục Tỉnh vào những năm giao thời cuối thế kỷ XIX. Từ nhỏ, vì một lần té giếng, người trong vùng đều đồn rằng y chậm trí, ngây ngô hơn người. Dẫu vậy, cha má cùng anh Hai và chị Ba vẫn hết mực yêu thương, cưng chiều đứa út như báu vật trong nhà. Đến tuổi dựng vợ gả chồng, ông bà Lớn vì lo cho tương lai của {{user}} nên một mực muốn lo chuyện trăm năm. Nhưng y hiểu rõ bản thân chưa hề muốn thành thân, càng không nỡ vì mình mà làm lỡ dở cuộc đời người khác. Bí đường, {{user}} đành giả điên giả dại, đập phá om sòm mong cha má đổi ý. Nào ngờ, thay vì hoãn cưới, ông bà Lớn lại tức tốc mời Hồ Tĩnh An - vị thầy thuốc trẻ nổi danh khắp vùng - đến bắt mạch chữa bệnh. {{user}} cứ ngỡ chỉ cần diễn cho giống là có thể qua mặt tất cả. Tiếc rằng, người bước vào căn buồng hôm ấy lại là kẻ chưa từng bắt sai một mạch bệnh nào.",
            extraImages: [
                "https://i.ibb.co/jPzJFF4k/b3d69e979713164d4f02.jpg",
                
            ],
            links: [
                { title: "Link GG AI", url: "https://aistudio.google.com/app/prompts?state=%7B%22ids%22:%5B%2211fuvTR_5Zft3ii5ySN3oXZypqr5saJnR%22%5D,%22action%22:%22open%22,%22userId%22:%22108161815635416619104%22,%22resourceKeys%22:%7B%7D%7D" },
       
            ]
        },
        {
            id: 2,
            name: "Lâm Dịch",
            image: "https://i.pinimg.com/736x/a2/5c/41/a25c4113e6480e6fbba6e3a67716f9fa.jpg",
            fullImage: "https://i.pinimg.com/736x/a2/5c/41/a25c4113e6480e6fbba6e3a67716f9fa.jpg",
            tags: ["hiện đại", "học đường", "BG"],
            age: "17 tuổi (Lớp 11A1)",
            appearance: "Tóc rối bồng bềnh, hay đeo tai nghe, phong cách ăn mặc streetwear. Mắt một mí xếch.",
            personality: "Học tra, hay ngủ gật trên lớp. Không quan tâm sự đời ngoại trừ nữ chính.",
            story: "Hội trưởng hội học sinh và Trùm trường - một mô tuýp cũ nhưng chưa bao giờ hết hot.\nLâm Dịch ghét nhất là những kẻ đạo lý, cho đến khi bị hội trưởng ép học bài mỗi ngày.",
            extraImages: [], // Để trống nếu không có ảnh phụ
            links: [] // Để trống nếu không có link
        },
        {
            id: 3,
            name: "Alexey",
            image: "https://i.pinimg.com/736x/7c/49/71/7c4971c667083a218d6bfdf8268677c7.jpg",
            fullImage: "https://i.pinimg.com/736x/7c/49/71/7c4971c667083a218d6bfdf8268677c7.jpg",
            tags: ["hiện đại", "BL", "mafia"],
            age: "28 tuổi",
            appearance: "Tóc vàng bạch kim, mắt xanh lam. Cơ thể nhiều sẹo, mặc vest ba mảnh.",
            personality: "Điên cuồng, chiếm hữu cao, nhưng khi ở cạnh người yêu thì lại giả vờ yếu đuối.",
            story: "Người thừa kế gia tộc Mafia Nga. Sống trong bóng tối từ nhỏ.\nĐể tiếp cận ánh sáng duy nhất của đời mình, hắn đã đóng giả làm một giáo viên mỹ thuật nghèo khó.",
            extraImages: [
                "https://i.pinimg.com/736x/21/fb/67/21fb67a29e2f411b7dfb33230a1334c9.jpg"
            ],
            links: [
                { title: "Artist: Twitter/X", url: "#" }
            ]
        }
    ];

    // Tạo danh sách tag tự động từ Data
    const allTags = ["Tất cả", ...new Set(ocData.flatMap(oc => oc.tags))];

    // ---------------------------------------------------------
    // LOGIC CODE (Không cần chỉnh sửa phần dưới này)
    // ---------------------------------------------------------
    
    let currentTag = "Tất cả";
    let searchQuery = "";

    const galleryGrid = document.getElementById("galleryGrid");
    const tagsContainer = document.getElementById("tagsContainer");
    const searchInput = document.getElementById("searchInput");
    const noResult = document.getElementById("no-result");
    
    // Khởi tạo trang
    function init() {
        renderTags();
        renderGallery(ocData);
        
        // Sự kiện tìm kiếm
        searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase();
            filterData();
        });
    }

    // Render nút Tags
    function renderTags() {
        tagsContainer.innerHTML = "";
        allTags.forEach(tag => {
            const btn = document.createElement("button");
            btn.className = `tag-btn ${tag === currentTag ? 'active' : ''}`;
            btn.textContent = tag;
            btn.onclick = () => {
                currentTag = tag;
                renderTags(); // Update màu nút
                filterData();
            };
            tagsContainer.appendChild(btn);
        });
    }

    // Lọc dữ liệu theo tag và search
    function filterData() {
        let filtered = ocData;
        
        if (currentTag !== "Tất cả") {
            filtered = filtered.filter(oc => oc.tags.includes(currentTag));
        }
        
        if (searchQuery !== "") {
            filtered = filtered.filter(oc => oc.name.toLowerCase().includes(searchQuery));
        }

        renderGallery(filtered);
    }

    // Render danh sách ô vuông (Trang chủ)
    function renderGallery(data) {
        galleryGrid.innerHTML = "";
        
        if(data.length === 0) {
            noResult.style.display = "block";
        } else {
            noResult.style.display = "none";
            data.forEach(oc => {
                const card = document.createElement("div");
                card.className = "card";
                card.onclick = () => showDetail(oc.id);
                
                card.innerHTML = `
                    <img class="card-img" src="${oc.image}" alt="${oc.name}">
                    <div class="card-info">
                        <div class="card-name">${oc.name}</div>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }
    }

    // --- CHUYỂN TRANG (VIEWS) ---

    // Hiện trang chi tiết
    function showDetail(id) {
        const oc = ocData.find(item => item.id === id);
        if(!oc) return;

        // Điền dữ liệu vào trang chi tiết
        document.getElementById("dt-image").src = oc.fullImage;
        document.getElementById("dt-name").textContent = oc.name;
        document.getElementById("dt-age").textContent = oc.age;
        document.getElementById("dt-appearance").textContent = oc.appearance;
        document.getElementById("dt-personality").textContent = oc.personality;
        document.getElementById("dt-story").textContent = oc.story;

        // Tags
        const tagsHtml = oc.tags.map(tag => `<span class="detail-tag">${tag}</span>`).join('');
        document.getElementById("dt-tags").innerHTML = tagsHtml;

        // Ảnh phụ
        const extraImgContainer = document.getElementById("dt-extra-images");
        extraImgContainer.innerHTML = "";
        if(oc.extraImages && oc.extraImages.length > 0) {
            oc.extraImages.forEach(imgLink => {
                extraImgContainer.innerHTML += `<img src="${imgLink}" alt="Bối cảnh">`;
            });
        }

        // Links
        const linksContainer = document.getElementById("dt-links");
        linksContainer.innerHTML = "";
        if(oc.links && oc.links.length > 0) {
            oc.links.forEach(link => {
                linksContainer.innerHTML += `<a href="${link.url}" class="link-btn" target="_blank">${link.title}</a>`;
            });
        }

        // Đổi view
        document.getElementById("home-view").classList.remove("active");
        window.scrollTo(0, 0); // Cuộn lên đầu trang
        document.getElementById("detail-view").classList.add("active");
    }

    // Quay lại trang chủ
    function goHome() {
        document.getElementById("detail-view").classList.remove("active");
        document.getElementById("home-view").classList.add("active");
    }

    // Chạy app
    init();

</script>
</body>
</html>
