<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạp Hóa Chồng Cún Bự</title>
    
    <!-- Import Font chữ nghệ thuật từ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ================= CSS: THIẾT LẬP GIAO DIỆN ================= */
        :root {
            --bg-color: #F8F5F0; 
            --primary-color: #722F37; 
            --primary-hover: #5a242b;
            --text-dark: #333333;
            --text-light: #666666;
            --card-bg: #FFFFFF;
            --font-serif: 'Playfair Display', serif;
            --font-body: 'Lora', serif; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-dark); font-family: var(--font-body); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* --- Header & Title --- */
        header { text-align: center; margin-bottom: 40px; animation: fadeIn 0.8s ease; }
        h1 { font-family: var(--font-serif); font-size: 3.5rem; color: var(--primary-color); margin-bottom: 10px; font-weight: 700; }

        /* --- Controls: Search & Tags --- */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 40px; }
        .search-bar { width: 100%; max-width: 500px; padding: 12px 20px; border: 1px solid #ddd; border-radius: 50px; font-family: var(--font-body); font-size: 1rem; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--primary-color); box-shadow: 0 0 8px rgba(114, 47, 55, 0.2); }
        
        .tags-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .tag-btn { background-color: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 6px 16px; border-radius: 50px; cursor: pointer; font-family: var(--font-body); transition: all 0.3s; }
        .tag-btn:hover, .tag-btn.active { background-color: var(--primary-color); color: #fff; }

        /* --- Gallery Grid --- */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        /* Chuyển .card thành thẻ a nên cần style text-decoration */
        .card { 
            display: block; 
            text-decoration: none; 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: transform 0.3s, box-shadow 0.3s; 
            animation: fadeIn 0.5s ease;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .card-info { padding: 20px 15px; text-align: center; display: flex; flex-direction: column; align-items: center;}
        .card-name { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; color: var(--primary-color); margin-bottom: 8px;}
        
        /* --- Phần Slogan và Tag mới --- */
        .card-slogan {
            font-size: 0.95rem;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-tags-mini {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }
        .card-tag-mini {
            background-color: #f0f0f0;
            color: #555;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* Phần tim trên trang chủ */
        .card-likes { 
            position: relative;
            z-index: 2; /* Nổi lên trên thẻ a để bấm được */
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 1rem; 
            color: var(--text-light); 
            font-weight: bold; 
            background: none;
            border: 2px solid #eee;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s;
            font-family: var(--font-body);
        }
        .card-likes:hover { background-color: rgba(114, 47, 55, 0.05); border-color: rgba(114, 47, 55, 0.2); }

        /* ================= CHATBOT WIDGET ================= */
        .chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(114, 47, 55, 0.4);
            border: none;
            transition: 0.3s;
            z-index: 1000;
        }
        .chat-btn:hover { transform: scale(1.1); background-color: var(--primary-hover); }

        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none; /* Ẩn mặc định */
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            border: 1px solid #eee;
            animation: slideUp 0.3s ease;
        }
        .chat-window.active { display: flex; }

        .chat-header { background-color: var(--primary-color); color: white; padding: 15px; font-family: var(--font-serif); font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .close-chat { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        
        .chat-body { height: 300px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-color: #faf9f7; font-size: 0.95rem; }
        
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; }
        .msg-bot { background-color: #fff; color: var(--text-dark); align-self: flex-start; border: 1px solid #eee; border-bottom-left-radius: 2px; }
        .msg-bot a { color: var(--primary-color); font-weight: bold; }
        .msg-user { background-color: var(--primary-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-footer { display: flex; padding: 10px; background: white; border-top: 1px solid #eee; }
        .chat-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-family: var(--font-body); }
        .chat-send { background: none; border: none; color: var(--primary-color); font-weight: bold; padding: 0 15px; cursor: pointer; font-size: 1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .chat-window { width: calc(100% - 40px); right: 20px; bottom: 90px; }
            .chat-btn { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-view" class="view active">
        <header>
            <h1>Tạp Hóa Chồng Cún Bự</h1>
            <p>Nơi lưu giữ những đứa con tinh thần</p>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" class="search-bar" placeholder="Nhập tên nhân vật bạn muốn tìm...">
            <div class="tags-container" id="tagsContainer"></div>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Thẻ nhân vật sẽ hiển thị ở đây -->
        </div>
        
        <div id="no-result" style="display:none; text-align:center; color: var(--text-light); width: 100%;">
            Không tìm thấy nhân vật nào phù hợp 😭
        </div>
    </div>
</div>

<!-- CHATBOT WIDGET -->
<button class="chat-btn" onclick="toggleChat()">💬</button>

<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        Trợ lý Cún Bự 🐶
        <button class="close-chat" onclick="toggleChat()">✖</button>
    </div>
    <div class="chat-body" id="chatBody">
        <div class="msg msg-bot">Chào bạn! Bạn đang tìm nhân vật theo gu nào (BL, Việt Nam xưa, trầm ổn, lạnh lùng...)? Hãy nói cho tui biết nhé!</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="chatInput" class="chat-input" placeholder="Nhập gu của bạn..." onkeypress="handleEnter(event)">
        <button class="chat-send" onclick="sendMessage()">Gửi</button>
    </div>
</div>

<!-- ================= JAVASCRIPT & FIREBASE ================= -->
<!-- 1. Import SDK của Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // ==========================================
    // 2. KHỞI TẠO FIREBASE
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCHEEapKd9PyLDJS5My0usnremVMmdzl4M",
      authDomain: "taphoachongcunbu-3d24a.firebaseapp.com",
      databaseURL: "https://taphoachongcunbu-3d24a-default-rtdb.firebaseio.com",
      projectId: "taphoachongcunbu-3d24a",
      storageBucket: "taphoachongcunbu-3d24a.firebasestorage.app",
      messagingSenderId: "1028086205634",
      appId: "1:1028086205634:web:679c8b0666347176eebf5b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================
    // 3. DỮ LIỆU NHÂN VẬT (Đã cập nhật Slogan)
    // ==========================================
    const ocData = [
        {
            id: 1,
            name: "Hồ Tĩnh An",
            slug: "ho-tinh-an.html",
            likeKey: "likes_hotinhan", 
            image: "https://i.ibb.co/JYRVxZV/c5f0dd92d21653480a07.jpg",
            slogan: "Lần sau có giả điên thì chọn trò nào dưới đất mà làm. Lỡ ngã đau... thì ai chịu cho em?",
            tags: ["Việt Nam xưa", "BL", "BG", "thầy thuốc"],
            personality: "trầm ổn, kiệm lời, giữ lễ nghĩa, lạnh lùng, xa cách, dịu dàng ngầm",
            story: "Con út nhà ông Lớn ở làng An Hòa Nam Kỳ Lục Tỉnh. Hồ Tĩnh An là vị thầy thuốc trẻ bắt mạch không bao giờ sai."
        },
        {
            id: 2,
            name: "Triển Húc", 
            slug: "trien-huc.html", 
            likeKey: "likes_trienhuc",
            image: "https://i.ibb.co/bMR7xgcq/229c14aef62a77742e3b.jpg",
            slogan: "Bớt gán ghép linh tinh, người tôi thích chỉ có một thôi.",
            tags: ["hệ thống", "thanh xuân vườn trường", "BG", "BL"],
            personality: "lạnh lùng, học bá, nam chính, chung tình",
            story: "Tác hợp nam chính và nữ chính, nhưng nữ chính chỉ yêu bạn."
        },
        {
            id: 3,
            name: "Rowan Arden", 
            slug: "rowan-arden.html", 
            likeKey: "likes_rowan",
            image: "https://i.ibb.co/VWY1TsSy/c4b0b21e7399f2c7ab88.jpg",
            slogan: "Tao thật sự thích cô ấy lắm... {{user}}, mày giúp tao tán cô ấy được không?",
            tags: ["char đã có crush", "thanh xuân vườn trường", "BG", "BL"],
            personality: "dương quang, trai thể thao, friendzone, ngoại quốc",
            story: "Thằng bạn thân không yêu bạn."
        }
    ];

    const allTags = ["Tất cả", ...new Set(ocData.flatMap(oc => oc.tags))];
    
    let currentTag = "Tất cả";
    let searchQuery = "";

    const galleryGrid = document.getElementById("galleryGrid");
    const tagsContainer = document.getElementById("tagsContainer");
    const searchInput = document.getElementById("searchInput");
    const noResult = document.getElementById("no-result");
    
    function init() {
        renderTags();
        renderGallery(ocData);
        
        searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase();
            filterData();
        });
    }

    function renderTags() {
        tagsContainer.innerHTML = "";
        allTags.forEach(tag => {
            const btn = document.createElement("button");
            btn.className = `tag-btn ${tag === currentTag ? 'active' : ''}`;
            btn.textContent = tag;
            btn.onclick = () => { currentTag = tag; renderTags(); filterData(); };
            tagsContainer.appendChild(btn);
        });
    }

    function filterData() {
        let filtered = ocData;
        if (currentTag !== "Tất cả") filtered = filtered.filter(oc => oc.tags.includes(currentTag));
        if (searchQuery !== "") filtered = filtered.filter(oc => oc.name.toLowerCase().includes(searchQuery));
        renderGallery(filtered);
    }

   function renderGallery(data) {
        galleryGrid.innerHTML = "";
        if(data.length === 0) {
            noResult.style.display = "block";
        } else {
            noResult.style.display = "none";
            data.forEach(oc => {
                const card = document.createElement("a");
                card.className = "card";
                card.href = oc.slug; 

                // Kiểm tra LocalStorage
                let isLikedLocally = localStorage.getItem(`isLiked_${oc.likeKey}`) === 'true';
                let heartIcon = isLikedLocally ? '❤️' : '🤍';

                // Tạo danh sách tag nhỏ
                let tagsHTML = oc.tags.map(tag => `<span class="card-tag-mini">${tag}</span>`).join('');

                card.innerHTML = `
                    <img class="card-img" src="${oc.image}" alt="${oc.name}">
                    <div class="card-info">
                        <div class="card-name">${oc.name}</div>
                        <div class="card-slogan">"${oc.slogan}"</div>
                        <div class="card-tags-mini">${tagsHTML}</div>
                        
                        <!-- Nút tim gọi hàm toggleLike -->
                        <button class="card-likes" id="like-btn-${oc.id}" onclick="toggleLike(event, '${oc.likeKey}', ${oc.id})">
                            <span id="heart-icon-${oc.id}">${heartIcon}</span> 
                            <span id="like-count-${oc.id}">0</span>
                        </button>
                    </div>
                `;
                galleryGrid.appendChild(card);

                // FIREBASE: Lấy dữ liệu Realtime và tự nhảy số
                if (oc.likeKey) {
                    db.ref(`likes/${oc.likeKey}`).on('value', (snapshot) => {
                        const count = snapshot.val() || 0;
                        const el = document.getElementById(`like-count-${oc.id}`);
                        if(el) el.innerText = count;
                    });
                }
            });
        }
    }

    // ==========================================
    // 4. XỬ LÝ THẢ TIM VỚI FIREBASE
    // ==========================================
    function toggleLike(event, likeKey, id) {
        event.preventDefault();
        event.stopPropagation();

        const btn = document.getElementById(`like-btn-${id}`);
        const iconSpan = document.getElementById(`heart-icon-${id}`);
        
        // Khóa nút tạm thời tránh bấm quá nhanh
        btn.disabled = true;

        let isLikedLocally = localStorage.getItem(`isLiked_${likeKey}`) === 'true';
        const likeRef = db.ref(`likes/${likeKey}`);

        if (isLikedLocally) {
            // UNLIKE -> Trừ tim
            localStorage.setItem(`isLiked_${likeKey}`, 'false');
            iconSpan.innerText = '🤍';
            
            likeRef.transaction(current => {
                return Math.max(0, (current || 0) - 1);
            }).then(() => btn.disabled = false)
              .catch(() => btn.disabled = false);

        } else {
            // LIKE -> Cộng tim
            localStorage.setItem(`isLiked_${likeKey}`, 'true');
            iconSpan.innerText = '❤️';
            
            likeRef.transaction(current => {
                return (current || 0) + 1;
            }).then(() => btn.disabled = false)
              .catch(() => btn.disabled = false);
        }
    }

    // ==========================================
    // 5. LOGIC CHATBOT AI
    // ==========================================
    const chatWindow = document.getElementById("chatWindow");
    const chatBody = document.getElementById("chatBody");
    const chatInput = document.getElementById("chatInput");

    function toggleChat() {
        chatWindow.classList.toggle("active");
        if(chatWindow.classList.contains("active")) chatInput.focus();
    }

    function handleEnter(e) {
        if(e.key === "Enter") sendMessage();
    }

    function sendMessage() {
        const text = chatInput.value.trim();
        if(!text) return;

        appendMessage(text, "msg-user");
        chatInput.value = "";

        setTimeout(() => {
            const response = botBrain(text);
            appendMessage(response, "msg-bot");
        }, 500);
    }

    function appendMessage(text, className) {
        const div = document.createElement("div");
        div.className = `msg ${className}`;
        div.innerHTML = text; 
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight; 
    }

    function botBrain(input) {
        const keywords = input.toLowerCase().split(/\s+/);
        let matches = []; // Mảng chứa tất cả nhân vật có điểm khớp

        ocData.forEach(oc => {
            let score = 0;
            // Gộp data để quét
            const dataString = (oc.tags.join(" ") + " " + oc.personality + " " + oc.story + " " + oc.name).toLowerCase();
            
            keywords.forEach(kw => {
                if(dataString.includes(kw)) score++;
            });

            // Nếu khớp ít nhất 1 từ khóa, đưa vào danh sách
            if(score > 0) {
                matches.push({ oc: oc, score: score });
            }
        });

        // Nếu có nhân vật phù hợp
        if(matches.length > 0) {
            // Sắp xếp mảng từ điểm cao xuống điểm thấp (ai hợp gu nhất lên đầu)
            matches.sort((a, b) => b.score - a.score);

            let response = `Tui tìm thấy vài gương mặt cực kỳ hợp gu với bạn nè! 🥰<br><br>`;
            
            // Lấy tối đa 3 người hợp nhất để show ra tránh bị dài quá
            let topMatches = matches.slice(0, 3);

            topMatches.forEach(match => {
                response += `✨ <strong>${match.oc.name}</strong><br>
                             <a href="${match.oc.slug}">👉 Xem chi tiết ngay và luôn</a><br><br>`;
            });

            // Nếu còn nhiều hơn 3 người, mớm thêm câu hỏi cho người dùng (Cách 2)
            if (matches.length > 3) {
                response += `<i>(Vẫn còn ${matches.length - 3} người nữa hợp gu. Bạn thử gõ thêm từ khóa như "học đường", "dịu dàng"... để tui lọc kỹ hơn nha! 🤔)</i>`;
            }

            return response;
        } else {
            return `Trùi ui, hiện tại tui chưa có nhân vật nào khớp với gu này. Bạn thử nhập từ khóa khác (ví dụ: BL, hệ thống, trầm ổn...) xem sao nha! 🥺`;
        }
    }

    // Khởi chạy web
    init();

</script>
</body>
</html>
